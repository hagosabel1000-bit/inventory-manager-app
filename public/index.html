<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory System</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .auth-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        .toggle-link { color: #007bff; cursor: pointer; font-size: 0.9rem; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title">Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button id="auth-btn" onclick="handleAuth()">Login</button>
    <span class="toggle-link" onclick="toggleForm()" id="toggle-text">Need an account? Register</span>
</div>

<script src="script.js"></script>
<script>
    let isLogin = true;
    function toggleForm() {
        isLogin = !isLogin;
        document.getElementById('form-title').innerText = isLogin ? 'Login' : 'Register';
        document.getElementById('auth-btn').innerText = isLogin ? 'Login' : 'Register';
        document.getElementById('toggle-text').innerText = isLogin ? 'Need an account? Register' : 'Have an account? Login';
    }

    async function handleAuth() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const endpoint = isLogin ? '/auth/login' : '/auth/register';

        try {
            const response = await fetch(`http://localhost:3000${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            if (response.ok) {
                if (isLogin) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/public/dashboard.html';
                } else {
                    alert('Registration successful! Please login.');
                    toggleForm();
                }
            } else {
                alert(data.message);
            }
        } catch (e) { alert('Server connection error'); }
    }
</script>
</body>
</html>
